<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#0A0A0F"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="AppAholic"/>
<link rel="apple-touch-icon" href="/icons/icon-192.png"/>
<link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png"/>
<link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144.png"/>
<link rel="apple-touch-icon" sizes="128x128" href="/icons/icon-128.png"/>
<link rel="apple-touch-startup-image" href="/icons/icon-512.png"/>
<meta name="msapplication-TileImage" content="/icons/icon-144.png"/>
<meta name="msapplication-TileColor" content="#0A0A0F"/>
<title>You're offline — AppAholic</title>
<meta name="robots" content="noindex"/>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230A0A0F'/><circle cx='16' cy='16' r='7' fill='%23C8FF00'/></svg>"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,'Inter',sans-serif;background:#0A0A0F;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
  .wrap{max-width:400px}
  .logo{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:40px;display:flex;align-items:center;justify-content:center;gap:8px}
  .logo-dot{width:9px;height:9px;border-radius:50%;background:#C8FF00;border:2px solid #1C1C26;display:inline-block}
  .icon{font-size:64px;margin-bottom:24px}
  h1{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:12px}
  p{font-size:14px;color:rgba(255,255,255,.55);line-height:1.75;margin-bottom:32px}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;border-radius:999px;background:#C8FF00;color:#0A0A0F;font-size:14px;font-weight:700;text-decoration:none;cursor:pointer;border:none;font-family:inherit;transition:filter .2s}
  .btn:hover{filter:brightness(.9)}
  .status{margin-top:20px;font-size:12px;color:rgba(255,255,255,.3)}
  #onlineStatus{color:#00C875;font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo"><span class="logo-dot"></span>AppAholic</div>
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>It looks like you lost your internet connection. Some pages are available offline — others need a live connection to load.</p>
  <button class="btn" onclick="tryReload()">↻ Try again</button>
  <div class="status">Connection status: <span id="onlineStatus">checking...</span></div>
</div>
<script>
  function updateStatus(){
    var el = document.getElementById('onlineStatus');
    if(navigator.onLine){
      el.textContent = 'Online';
      el.style.color = '#00C875';
    } else {
      el.textContent = 'Offline';
      el.style.color = '#FF3E6C';
    }
  }
  function tryReload(){
    if(navigator.onLine) window.history.back();
    else updateStatus();
  }
  updateStatus();
  window.addEventListener('online',  function(){ updateStatus(); setTimeout(function(){ window.history.back(); }, 500); });
  window.addEventListener('offline', updateStatus);
</script>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('/sw.js', { scope: '/' })
      .then(function(reg){
        console.log('SW registered:', reg.scope);
        // Check for updates every 60s
        setInterval(function(){ reg.update(); }, 60000);
      })
      .catch(function(err){ console.warn('SW registration failed:', err); });
  });
}
// PWA install prompt
var deferredPrompt;
window.addEventListener('beforeinstallprompt', function(e){
  e.preventDefault();
  deferredPrompt = e;
  // Show install banner if it exists
  var banner = document.getElementById('pwaInstallBanner');
  if(banner) banner.style.display = 'flex';
});
window.addEventListener('appinstalled', function(){
  deferredPrompt = null;
  var banner = document.getElementById('pwaInstallBanner');
  if(banner) banner.style.display = 'none';
});
function installPWA(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(function(r){
    deferredPrompt = null;
    var banner = document.getElementById('pwaInstallBanner');
    if(banner) banner.style.display = 'none';
  });
}
</script>
</body>
</html>

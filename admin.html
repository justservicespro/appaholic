<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0A1220"/>
<title>Admin — AppAholic</title>
<meta name="robots" content="noindex, nofollow"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/assets/theme.css"/>
<style>
.admin-login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--ink)}
.admin-login-card{width:100%;max-width:380px;background:var(--white);border-radius:var(--r-xl);box-shadow:var(--shadow-lg);padding:36px 32px}
.admin-login-card h1{font-family:var(--font-display);font-size:21px;font-weight:700;margin-bottom:6px}
.admin-login-card p{font-size:13px;color:var(--muted);margin-bottom:24px}
.admin-error{margin-top:14px;padding:10px 13px;background:#FBEAE9;border:1.5px solid var(--stamp-red);border-radius:8px;font-size:12.5px;color:var(--stamp-red);display:none}
.admin-error.show{display:block}

.admin-shell{display:none;min-height:100vh}
.admin-topbar{background:var(--ink);color:var(--white);padding:14px clamp(16px,3vw,32px);display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50}
.admin-topbar__logo{font-family:var(--font-display);font-weight:700;font-size:17px;display:flex;align-items:center;gap:8px}
.admin-topbar__logo-mark{width:24px;height:24px;border-radius:6px;background:var(--ochre);color:var(--ink);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:12px;font-weight:700}
.admin-tabs{display:flex;gap:4px;flex:1;overflow-x:auto}
.admin-tab{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;color:rgba(255,255,255,.6);white-space:nowrap}
.admin-tab.active{background:rgba(255,255,255,.1);color:var(--white)}
.admin-tab:hover{color:var(--white)}

.admin-body{max-width:1200px;margin:0 auto;padding:32px clamp(16px,3vw,32px) 60px}
.admin-stat-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:32px}
@media(max-width:900px){.admin-stat-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:560px){.admin-stat-grid{grid-template-columns:1fr 1fr}}
.admin-stat{background:var(--white);border:1.5px solid var(--line);border-radius:var(--r-lg);padding:16px}
.admin-stat strong{display:block;font-family:var(--font-display);font-size:22px;font-weight:700}
.admin-stat span{font-size:10.5px;color:var(--muted);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.03em}

.admin-panel{display:none}
.admin-panel.active{display:block}
.admin-table-wrap{background:var(--white);border:1.5px solid var(--line);border-radius:var(--r-xl);overflow:hidden;overflow-x:auto}
.admin-table{width:100%;border-collapse:collapse;font-size:12.5px}
.admin-table th{text-align:left;padding:11px 14px;background:var(--paper);border-bottom:1.5px solid var(--line);font-family:var(--font-mono);font-size:10px;text-transform:uppercase;color:var(--muted);letter-spacing:.03em;white-space:nowrap}
.admin-table td{padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:top}
.admin-table tr:last-child td{border-bottom:none}
.admin-table tr:hover td{background:var(--paper)}
.admin-cell-truncate{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.admin-status-select{padding:5px 8px;border-radius:6px;border:1.5px solid var(--line);font-size:11.5px;background:var(--white)}
.admin-empty{padding:50px 20px;text-align:center;color:var(--muted)}
.admin-refresh-row{display:flex;justify-content:flex-end;margin-bottom:12px}
</style>
</head>
<body>

<div class="admin-login-wrap" id="loginWrap">
  <div class="admin-login-card">
    <h1>AppAholic Admin</h1>
    <p>Internal access only.</p>
    <form id="loginForm" novalidate>
      <div class="form-row"><label>Email</label><input class="form-input" type="email" id="adminEmail" autocomplete="username"/></div>
      <div class="form-row"><label>Password</label><input class="form-input" type="password" id="adminPassword" autocomplete="current-password"/></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center" id="loginBtn">Sign In</button>
      <div class="admin-error" id="loginError"></div>
    </form>
  </div>
</div>

<div class="admin-shell" id="adminShell">
  <div class="admin-topbar">
    <div class="admin-topbar__logo"><span class="admin-topbar__logo-mark">A</span>Admin</div>
    <div class="admin-tabs" id="adminTabs">
      <button class="admin-tab active" data-panel="overview">Overview</button>
      <button class="admin-tab" data-panel="requests">Requests</button>
      <button class="admin-tab" data-panel="messages">Messages</button>
      <button class="admin-tab" data-panel="purchases">Purchases</button>
      <button class="admin-tab" data-panel="subscriptions">Subscriptions</button>
    </div>
    <button class="btn btn-ghost btn-sm" style="border-color:rgba(255,255,255,.25);color:var(--white)" onclick="adminSignOut()">Sign Out</button>
  </div>

  <div class="admin-body">
    <div class="admin-stat-grid" id="statGrid"></div>

    <div class="admin-panel active" id="panel-overview">
      <div class="admin-empty">Pick a tab above — Requests, Messages, Purchases or Subscriptions — to see the underlying data.</div>
    </div>

    <div class="admin-panel" id="panel-requests">
      <div class="admin-refresh-row"><button class="btn btn-ghost btn-sm" onclick="loadRequests()">Refresh</button></div>
      <div class="admin-table-wrap"><table class="admin-table"><thead><tr><th>Date</th><th>Requester</th><th>Title</th><th>Category</th><th>Budget</th><th>Status</th></tr></thead><tbody id="requestsBody"></tbody></table></div>
    </div>

    <div class="admin-panel" id="panel-messages">
      <div class="admin-refresh-row"><button class="btn btn-ghost btn-sm" onclick="loadMessages()">Refresh</button></div>
      <div class="admin-table-wrap"><table class="admin-table"><thead><tr><th>Date</th><th>From</th><th>Topic</th><th>Message</th></tr></thead><tbody id="messagesBody"></tbody></table></div>
    </div>

    <div class="admin-panel" id="panel-purchases">
      <div class="admin-refresh-row"><button class="btn btn-ghost btn-sm" onclick="loadPurchases()">Refresh</button></div>
      <div class="admin-table-wrap"><table class="admin-table"><thead><tr><th>Date</th><th>App</th><th>Email</th><th>Amount</th><th>Status</th><th>Ref</th></tr></thead><tbody id="purchasesBody"></tbody></table></div>
    </div>

    <div class="admin-panel" id="panel-subscriptions">
      <div class="admin-refresh-row"><button class="btn btn-ghost btn-sm" onclick="loadSubscriptions()">Refresh</button></div>
      <div class="admin-table-wrap"><table class="admin-table"><thead><tr><th>Date</th><th>Plan</th><th>Cycle</th><th>Amount</th><th>Status</th><th>Renews</th></tr></thead><tbody id="subscriptionsBody"></tbody></table></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="toastIcon">✅</span><span id="toastMsg"></span></div>
<script>
window.API_BASE = 'https://api.appaholic.justservices.pro';
var ADMIN_KEY = 'aah_admin_session';

function adminToken(){ return localStorage.getItem(ADMIN_KEY); }
function adminFetch(path, opts){
  opts = opts || {};
  var headers = Object.assign({}, opts.headers || {}, { 'Authorization': 'Bearer ' + adminToken() });
  return fetch(window.API_BASE + path, Object.assign({}, opts, { headers: headers }));
}
function showToast(msg, icon){
  var t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toastIcon').textContent = icon || '✅';
  t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); }, 3000);
}
function esc(s){ var d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; }
function fmtDate(iso){ return new Date(iso).toLocaleDateString('en-NG', { month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit' }); }

function adminSignOut(){ localStorage.removeItem(ADMIN_KEY); location.reload(); }

document.getElementById('loginForm').addEventListener('submit', function(e){
  e.preventDefault();
  var btn = document.getElementById('loginBtn');
  var err = document.getElementById('loginError');
  err.classList.remove('show');
  btn.disabled = true; btn.textContent = 'Signing in…';

  fetch(window.API_BASE + '/api/admin/login', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ email: document.getElementById('adminEmail').value.trim(), password: document.getElementById('adminPassword').value })
  }).then(function(r){ return r.json(); }).then(function(data){
    if(data.ok && data.token){
      localStorage.setItem(ADMIN_KEY, data.token);
      showAdminShell();
    } else {
      err.textContent = data.error || 'Invalid email or password.';
      err.classList.add('show');
    }
  }).catch(function(){
    err.textContent = 'Could not reach the server.';
    err.classList.add('show');
  }).finally(function(){ btn.disabled = false; btn.textContent = 'Sign In'; });
});

function showAdminShell(){
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('adminShell').style.display = 'block';
  loadOverview();
}

document.getElementById('adminTabs').addEventListener('click', function(e){
  var tab = e.target.closest('.admin-tab');
  if(!tab) return;
  document.querySelectorAll('.admin-tab').forEach(function(t){ t.classList.remove('active'); });
  tab.classList.add('active');
  var panel = tab.dataset.panel;
  document.querySelectorAll('.admin-panel').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById('panel-' + panel).classList.add('active');
  if(panel === 'requests' && !requestsLoaded) loadRequests();
  if(panel === 'messages' && !messagesLoaded) loadMessages();
  if(panel === 'purchases' && !purchasesLoaded) loadPurchases();
  if(panel === 'subscriptions' && !subscriptionsLoaded) loadSubscriptions();
});

function loadOverview(){
  adminFetch('/api/admin/overview').then(function(r){
    if(r.status === 401){ adminSignOut(); throw new Error('unauthorized'); }
    return r.json();
  }).then(function(data){
    if(!data.ok) return;
    var s = data.stats;
    document.getElementById('statGrid').innerHTML = [
      ['Total Users', s.totalUsers], ['App Requests', s.totalRequests], ['Contact Messages', s.totalMessages],
      ['Purchases', s.totalPurchases], ['Revenue', '₦' + Number(s.totalRevenue).toLocaleString()], ['Active Subs', s.activeSubscriptions],
    ].map(function(row){ return '<div class="admin-stat"><strong>' + row[1] + '</strong><span>' + row[0] + '</span></div>'; }).join('');
  }).catch(function(){});
}

var requestsLoaded = false, messagesLoaded = false, purchasesLoaded = false, subscriptionsLoaded = false;

function loadRequests(){
  adminFetch('/api/admin/requests').then(function(r){ return r.json(); }).then(function(data){
    requestsLoaded = true;
    var body = document.getElementById('requestsBody');
    if(!data.ok || !data.requests.length){ body.innerHTML = '<tr><td colspan="6" class="admin-empty">No requests yet.</td></tr>'; return; }
    body.innerHTML = data.requests.map(function(r){
      return '<tr><td>' + fmtDate(r.created_at) + '</td>' +
        '<td>' + esc(r.name) + '<br/><span style="color:var(--muted)">' + esc(r.email) + '</span></td>' +
        '<td class="admin-cell-truncate" title="' + esc(r.title) + '">' + esc(r.title) + '</td>' +
        '<td>' + esc(r.category || '—') + '</td><td>' + esc(r.budget || '—') + '</td>' +
        '<td><select class="admin-status-select" onchange="updateRequestStatus(\'' + r.id + '\', this.value)">' +
          ['submitted','in_progress','under_review','built','declined'].map(function(s){ return '<option value="'+s+'"'+(s===r.status?' selected':'')+'>'+s.replace('_',' ')+'</option>'; }).join('') +
        '</select></td></tr>';
    }).join('');
  }).catch(function(){ showToast('Could not load requests.', '⚠️'); });
}
function updateRequestStatus(id, status){
  adminFetch('/api/admin/requests/' + id, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ status: status }) })
    .then(function(r){ return r.json(); }).then(function(data){ showToast(data.ok ? 'Status updated.' : (data.error||'Update failed.'), data.ok ? '✅' : '⚠️'); })
    .catch(function(){ showToast('Could not update status.', '⚠️'); });
}

function loadMessages(){
  adminFetch('/api/admin/messages').then(function(r){ return r.json(); }).then(function(data){
    messagesLoaded = true;
    var body = document.getElementById('messagesBody');
    if(!data.ok || !data.messages.length){ body.innerHTML = '<tr><td colspan="4" class="admin-empty">No messages yet.</td></tr>'; return; }
    body.innerHTML = data.messages.map(function(m){
      return '<tr><td>' + fmtDate(m.created_at) + '</td><td>' + esc(m.name) + '<br/><span style="color:var(--muted)">' + esc(m.email) + '</span></td>' +
        '<td>' + esc(m.topic) + '</td><td class="admin-cell-truncate" title="' + esc(m.message) + '">' + esc(m.message) + '</td></tr>';
    }).join('');
  }).catch(function(){ showToast('Could not load messages.', '⚠️'); });
}

function loadPurchases(){
  adminFetch('/api/admin/purchases').then(function(r){ return r.json(); }).then(function(data){
    purchasesLoaded = true;
    var body = document.getElementById('purchasesBody');
    if(!data.ok || !data.purchases.length){ body.innerHTML = '<tr><td colspan="6" class="admin-empty">No purchases yet.</td></tr>'; return; }
    body.innerHTML = data.purchases.map(function(p){
      var appName = (p.apps && p.apps.name) || p.app_id || '—';
      return '<tr><td>' + fmtDate(p.created_at) + '</td><td>' + esc(appName) + '</td><td>' + esc(p.email) + '</td>' +
        '<td>₦' + Number(p.amount).toLocaleString() + '</td><td>' + esc(p.status) + '</td><td style="font-family:var(--font-mono);font-size:11px">' + esc(p.provider_ref || '—') + '</td></tr>';
    }).join('');
  }).catch(function(){ showToast('Could not load purchases.', '⚠️'); });
}

function loadSubscriptions(){
  adminFetch('/api/admin/subscriptions').then(function(r){ return r.json(); }).then(function(data){
    subscriptionsLoaded = true;
    var body = document.getElementById('subscriptionsBody');
    if(!data.ok || !data.subscriptions.length){ body.innerHTML = '<tr><td colspan="6" class="admin-empty">No subscriptions yet.</td></tr>'; return; }
    body.innerHTML = data.subscriptions.map(function(s){
      return '<tr><td>' + fmtDate(s.created_at) + '</td><td>' + esc(s.plan) + '</td><td>' + esc(s.billing_cycle) + '</td>' +
        '<td>₦' + Number(s.amount).toLocaleString() + '</td><td>' + esc(s.status) + '</td><td>' + (s.current_period_end ? fmtDate(s.current_period_end) : '—') + '</td></tr>';
    }).join('');
  }).catch(function(){ showToast('Could not load subscriptions.', '⚠️'); });
}

if(adminToken()) showAdminShell();
</script>
</body>
</html>

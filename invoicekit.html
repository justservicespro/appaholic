<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="manifest" href="/manifest-invoicekit.json"/>
<meta name="theme-color" content="#0A1220"/>
<title>InvoiceKit — AppAholic</title>
<meta name="description" content="Professional invoice generator. VAT/WHT support, PDF export, payment tracking."/>
<meta name="robots" content="noindex, nofollow"/>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230A1220'/><text x='16' y='22' font-family='monospace' font-size='16' font-weight='700' fill='%23E8A33D' text-anchor='middle'>A</text></svg>"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/assets/theme.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{overflow:hidden}
.ik-shell{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 66px)}
@media(max-width:860px){.ik-shell{grid-template-columns:1fr}.ik-sidebar{display:none}.ik-sidebar.mobile-open{display:flex;position:fixed;top:66px;left:0;bottom:0;width:86vw;z-index:80;box-shadow:var(--shadow-lg)}}

.ik-sidebar{background:var(--white);border-right:1.5px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
.ik-tabs{display:flex;border-bottom:1.5px solid var(--line)}
.ik-tab{flex:1;padding:13px;text-align:center;font-size:12.5px;font-weight:700;color:var(--muted);border-bottom:2px solid transparent}
.ik-tab.active{color:var(--ink);border-bottom-color:var(--ochre-dim)}
.ik-sidebar__actions{padding:12px 14px;border-bottom:1px solid var(--line)}
.ik-list{flex:1;overflow-y:auto;padding:8px}
.ik-item{padding:11px 12px;border-radius:8px;cursor:pointer;margin-bottom:3px}
.ik-item:hover{background:var(--paper-2)}
.ik-item.active{background:var(--paper-2);border-left:3px solid var(--ochre-dim);padding-left:9px}
.ik-item__title{font-size:13px;font-weight:700}
.ik-item__meta{font-size:11px;color:var(--muted);margin-top:2px}
.ik-item__foot{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.ik-item__amt{font-family:var(--font-mono);font-size:11.5px;font-weight:600}

.ik-main{overflow-y:auto;padding:28px clamp(16px,3vw,40px)}
.ik-main__inner{max-width:720px;margin:0 auto}
.ik-mobile-bar{display:none;padding:10px 16px;border-bottom:1px solid var(--line);gap:8px}
@media(max-width:860px){.ik-mobile-bar{display:flex;align-items:center}}

.ik-invoice-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.ik-invoice-head h1{font-family:var(--font-display);font-size:22px;font-weight:700}
.ik-lineitems{border:1.5px solid var(--line);border-radius:var(--r-lg);overflow:hidden;margin-bottom:18px}
.ik-line{display:grid;grid-template-columns:1fr 60px 90px 90px 28px;gap:8px;padding:10px 12px;border-bottom:1px solid var(--line);align-items:center}
.ik-line:last-child{border-bottom:none}
.ik-line input{border:1.5px solid var(--line);border-radius:6px;padding:7px 8px;font-size:12.5px;width:100%}
.ik-line input:focus{outline:none;border-color:var(--ink)}
.ik-line__amt{font-family:var(--font-mono);font-size:12.5px;text-align:right;font-weight:600}
.ik-line__del{color:var(--stamp-red);font-size:16px;text-align:center}
.ik-add-line{padding:10px 12px;font-size:12.5px;font-weight:600;color:var(--ochre-dim);display:flex;align-items:center;gap:6px}

.ik-totals{max-width:320px;margin-left:auto;margin-bottom:20px}
.ik-trow{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;color:var(--ink-3)}
.ik-trow.total{font-weight:700;color:var(--ink);border-top:1.5px solid var(--line);margin-top:6px;padding-top:10px;font-size:16px}

.status-stamp{font-size:9px;padding:2px 8px}
.ik-empty-main{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);text-align:center}
</style>
</head>
<body data-no-install-banner="true">
<header class="nav" role="banner">
  <div class="nav__inner">
    <a href="/" class="nav__logo" aria-label="AppAholic home"><span class="nav__logo-mark" aria-hidden="true">A</span><span>AppAholic</span></a>
    <nav class="nav__center" aria-label="Main navigation">
      <ul class="nav__links" role="list"><li><a href="/dashboard" class="nav__link">Dashboard</a></li><li><a href="/marketplace" class="nav__link">All Apps</a></li></ul>
    </nav>
    <div class="nav__actions"><span class="stamp stamp--ochre" style="font-size:9px">InvoiceKit</span></div>
  </div>
</header>

<div id="signedOutBlock" style="display:none" class="empty-state">
  <div class="empty-state__icon">🔒</div>
  <h3>Sign in to use InvoiceKit</h3>
  <p>Your clients and invoices are private and saved to your account.</p>
  <a href="/auth?redirect=/invoicekit" class="btn btn-primary" style="margin-top:18px">Sign In</a>
</div>

<div id="ikApp" class="ik-shell" style="display:none">
  <aside class="ik-sidebar" id="ikSidebar">
    <div class="ik-tabs">
      <button class="ik-tab active" data-tab="invoices" onclick="switchTab('invoices')">Invoices</button>
      <button class="ik-tab" data-tab="clients" onclick="switchTab('clients')">Clients</button>
    </div>
    <div class="ik-sidebar__actions">
      <button class="btn btn-primary btn-sm" style="width:100%;justify-content:center" id="newBtn" onclick="newInvoice()">+ New Invoice</button>
    </div>
    <div class="ik-list" id="ikList"></div>
  </aside>

  <main class="ik-main">
    <div class="ik-mobile-bar"><button class="btn btn-ghost btn-sm" id="mobileMenuBtn">☰ Menu</button></div>
    <div class="ik-main__inner" id="ikMainInner">
      <div class="ik-empty-main" id="ikEmptyMain">
        <div style="font-size:36px;margin-bottom:14px">🧾</div>
        <h3 style="font-family:var(--font-display);font-size:17px;margin-bottom:6px">No invoice selected</h3>
        <p style="font-size:13px;max-width:260px">Create a new invoice, or pick one from the list.</p>
      </div>
      <div id="invoiceEditor" style="display:none"></div>
      <div id="clientsPanel" style="display:none"></div>
    </div>
  </main>
</div>

<div class="toast" id="toast"><span id="toastIcon">✅</span><span id="toastMsg"></span></div>
<script src="/assets/app.js"></script>
<script>
if(!Session.isSignedIn()){
  document.getElementById('signedOutBlock').style.display = 'block';
} else {
  document.getElementById('ikApp').style.display = 'grid';
  initInvoiceKit();
}
AppInstall.tryAutoPromptFromUrl();

function initInvoiceKit(){
  var invoices = [], clients = [];
  var currentInvoice = null;
  var currentTab = 'invoices';

  function esc(s){ var d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; }
  function fmtN(n){ return '₦' + Number(n||0).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}); }

  function statusStamp(status){
    var map = { draft: ['stamp--ink','Draft'], sent: ['stamp--ochre','Sent'], paid: ['stamp--green','Paid'], overdue: ['stamp--red','Overdue'] };
    var m = map[status] || map.draft;
    return '<span class="stamp status-stamp ' + m[0] + '">' + m[1] + '</span>';
  }

  function switchTab(tab){
    currentTab = tab;
    document.querySelectorAll('.ik-tab').forEach(function(t){ t.classList.toggle('active', t.dataset.tab === tab); });
    document.getElementById('newBtn').style.display = tab === 'invoices' ? 'flex' : 'none';
    renderList();
    if(tab === 'clients') showClientsPanel();
  }
  window.switchTab = switchTab;

  function renderList(){
    var list = document.getElementById('ikList');
    if(currentTab === 'invoices'){
      if(!invoices.length){ list.innerHTML = '<div class="empty-state" style="padding:30px 16px"><div class="empty-state__icon" style="font-size:22px">🧾</div><p style="font-size:12.5px">No invoices yet</p></div>'; return; }
      list.innerHTML = invoices.map(function(inv){
        var active = currentInvoice && currentInvoice.id === inv.id ? 'active' : '';
        var clientName = (inv.invoicekit_clients && inv.invoicekit_clients.name) || 'No client';
        return '<div class="ik-item ' + active + '" onclick="window.__ikSelectInvoice(\'' + inv.id + '\')">' +
          '<div class="ik-item__title">' + esc(inv.invoice_number) + '</div>' +
          '<div class="ik-item__meta">' + esc(clientName) + '</div>' +
          '<div class="ik-item__foot"><span class="ik-item__amt">' + fmtN(inv.total) + '</span>' + statusStamp(inv.status) + '</div>' +
        '</div>';
      }).join('');
    } else {
      if(!clients.length){ list.innerHTML = '<div class="empty-state" style="padding:30px 16px"><div class="empty-state__icon" style="font-size:22px">👤</div><p style="font-size:12.5px">No clients yet</p></div>'; return; }
      list.innerHTML = clients.map(function(c){
        return '<div class="ik-item" onclick="window.__ikEditClient(\'' + c.id + '\')">' +
          '<div class="ik-item__title">' + esc(c.name) + '</div>' +
          '<div class="ik-item__meta">' + esc(c.email || 'No email') + '</div>' +
        '</div>';
      }).join('');
    }
  }

  function loadAll(){
    Promise.all([
      authFetch('/api/invoicekit/invoices').then(function(r){ return r.json(); }),
      authFetch('/api/invoicekit/clients').then(function(r){ return r.json(); }),
    ]).then(function(results){
      if(results[0].ok) invoices = results[0].invoices;
      if(results[1].ok) clients = results[1].clients;
      renderList();
    }).catch(function(){ showToast('Could not load your data.', '⚠️'); });
  }

  var draftItems = [];

  function newInvoice(){
    currentInvoice = null;
    draftItems = [{ description:'', qty:1, price:0 }];
    switchTab('invoices');
    showInvoiceEditor(null);
  }
  window.newInvoice = newInvoice;

  function selectInvoice(id){
    currentInvoice = invoices.find(function(i){ return i.id === id; });
    if(!currentInvoice) return;
    draftItems = JSON.parse(JSON.stringify(currentInvoice.items || []));
    if(!draftItems.length) draftItems = [{ description:'', qty:1, price:0 }];
    renderList();
    showInvoiceEditor(currentInvoice);
  }
  window.__ikSelectInvoice = selectInvoice;

  function showInvoiceEditor(inv){
    document.getElementById('ikEmptyMain').style.display = 'none';
    document.getElementById('clientsPanel').style.display = 'none';
    var editor = document.getElementById('invoiceEditor');
    editor.style.display = 'block';

    var clientOptions = '<option value="">No client selected</option>' + clients.map(function(c){
      var sel = inv && inv.client_id === c.id ? ' selected' : '';
      return '<option value="' + c.id + '"' + sel + '>' + esc(c.name) + '</option>';
    }).join('');

    var suggestedNum = inv ? inv.invoice_number : ('INV-' + String(invoices.length + 1).padStart(4, '0'));

    editor.innerHTML =
      '<div class="ik-invoice-head">' +
        '<div><input class="form-input" id="fInvNum" value="' + esc(suggestedNum) + '" style="font-family:var(--font-mono);font-weight:700;font-size:15px;max-width:200px"/></div>' +
        (inv ? statusStamp(inv.status) : '') +
      '</div>' +
      '<div class="form-grid-2">' +
        '<div class="form-row"><label>Client</label><select class="form-input" id="fClient">' + clientOptions + '</select></div>' +
        '<div class="form-row"><label>Your Business Name</label><input class="form-input" id="fBusiness" value="' + esc((inv && inv.business_name) || '') + '" placeholder="Your business name"/></div>' +
      '</div>' +
      '<div class="form-grid-2">' +
        '<div class="form-row"><label>Due Date</label><input class="form-input" type="date" id="fDueDate" value="' + ((inv && inv.due_date) || '') + '"/></div>' +
        '<div class="form-row"><label>Status</label><select class="form-input" id="fStatus">' +
          ['draft','sent','paid','overdue'].map(function(s){ return '<option value="'+s+'"'+((inv&&inv.status===s)?' selected':'')+'>'+s.charAt(0).toUpperCase()+s.slice(1)+'</option>'; }).join('') +
        '</select></div>' +
      '</div>' +
      '<div class="form-row"><label>Line Items</label>' +
        '<div class="ik-lineitems" id="lineItemsWrap"></div>' +
        '<button class="ik-add-line" onclick="addLine()">+ Add line item</button>' +
      '</div>' +
      '<div class="form-grid-2">' +
        '<div class="form-row"><label>VAT % <span style="color:var(--muted);font-weight:400">(Nigeria standard: 7.5%)</span></label><input class="form-input" type="number" id="fVat" value="' + ((inv && inv.vat_rate != null) ? inv.vat_rate : 7.5) + '" step="0.1"/></div>' +
        '<div class="form-row"><label>WHT % <span style="color:var(--muted);font-weight:400">(if applicable)</span></label><input class="form-input" type="number" id="fWht" value="' + ((inv && inv.wht_rate) || 0) + '" step="0.1"/></div>' +
      '</div>' +
      '<div class="ik-totals" id="ikTotals"></div>' +
      '<div style="display:flex;gap:10px;flex-wrap:wrap">' +
        '<button class="btn btn-primary" onclick="saveInvoice()">💾 Save</button>' +
        '<button class="btn btn-ghost" onclick="exportPdf()">⬇️ Download PDF</button>' +
        '<button class="btn btn-ghost" onclick="sendInvoiceEmail()">✉️ Send to Client</button>' +
        (inv ? '<button class="btn btn-ghost" style="color:var(--stamp-red);border-color:var(--stamp-red)" onclick="deleteInvoice()">🗑️ Delete</button>' : '') +
      '</div>';

    renderLines();
    ['fVat','fWht'].forEach(function(id){ document.getElementById(id).addEventListener('input', updateTotals); });
  }

  function renderLines(){
    var wrap = document.getElementById('lineItemsWrap');
    wrap.innerHTML = draftItems.map(function(item, i){
      return '<div class="ik-line">' +
        '<input placeholder="Description" value="' + esc(item.description) + '" oninput="updateLine(' + i + ',\'description\',this.value)"/>' +
        '<input type="number" min="1" value="' + item.qty + '" oninput="updateLine(' + i + ',\'qty\',this.value)"/>' +
        '<input type="number" min="0" value="' + item.price + '" oninput="updateLine(' + i + ',\'price\',this.value)"/>' +
        '<span class="ik-line__amt">' + fmtN(item.qty * item.price) + '</span>' +
        '<span class="ik-line__del" onclick="removeLine(' + i + ')">✕</span>' +
      '</div>';
    }).join('');
    updateTotals();
  }
  window.updateLine = function(i, field, val){ draftItems[i][field] = field === 'description' ? val : Number(val) || 0; renderLines(); };
  window.removeLine = function(i){ draftItems.splice(i, 1); if(!draftItems.length) draftItems.push({description:'',qty:1,price:0}); renderLines(); };
  window.addLine = function(){ draftItems.push({ description:'', qty:1, price:0 }); renderLines(); };

  function currentTotals(){
    var subtotal = draftItems.reduce(function(s,i){ return s + (Number(i.qty)||0) * (Number(i.price)||0); }, 0);
    var vatRate = Number(document.getElementById('fVat').value) || 0;
    var whtRate = Number(document.getElementById('fWht').value) || 0;
    var vat = subtotal * vatRate / 100;
    var wht = subtotal * whtRate / 100;
    return { subtotal: subtotal, vat: vat, wht: wht, total: subtotal + vat - wht, vatRate: vatRate, whtRate: whtRate };
  }

  function updateTotals(){
    var t = currentTotals();
    document.getElementById('ikTotals').innerHTML =
      '<div class="ik-trow"><span>Subtotal</span><span>' + fmtN(t.subtotal) + '</span></div>' +
      '<div class="ik-trow"><span>VAT (' + t.vatRate + '%)</span><span>' + fmtN(t.vat) + '</span></div>' +
      (t.whtRate ? '<div class="ik-trow"><span>WHT (' + t.whtRate + '%)</span><span>-' + fmtN(t.wht) + '</span></div>' : '') +
      '<div class="ik-trow total"><span>Total</span><span>' + fmtN(t.total) + '</span></div>';
  }
  window.updateTotals = updateTotals;

  function saveInvoice(){
    var t = currentTotals();
    var payload = {
      invoiceNumber: document.getElementById('fInvNum').value.trim(),
      clientId: document.getElementById('fClient').value || null,
      businessName: document.getElementById('fBusiness').value.trim(),
      dueDate: document.getElementById('fDueDate').value || null,
      items: draftItems.filter(function(i){ return i.description.trim(); }),
      vatRate: t.vatRate, whtRate: t.whtRate,
    };
    if(!payload.invoiceNumber || !payload.items.length){ showToast('Add an invoice number and at least one line item.', '⚠️'); return; }

    var req = currentInvoice
      ? authFetch('/api/invoicekit/invoices/' + currentInvoice.id, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(Object.assign(payload, { status: document.getElementById('fStatus').value })) })
      : authFetch('/api/invoicekit/invoices', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });

    req.then(function(r){ return r.json(); }).then(function(data){
      if(data.ok){
        showToast('Invoice saved.', '✅');
        loadAllThenReselect(data.invoice.id);
      } else { showToast(data.error || 'Could not save invoice.', '⚠️'); }
    }).catch(function(){ showToast('Could not reach the server.', '⚠️'); });
  }
  window.saveInvoice = saveInvoice;

  function loadAllThenReselect(id){
    authFetch('/api/invoicekit/invoices').then(function(r){ return r.json(); }).then(function(data){
      if(data.ok){ invoices = data.invoices; currentInvoice = invoices.find(function(i){ return i.id === id; }); renderList(); }
    });
  }

  function deleteInvoice(){
    if(!currentInvoice) return;
    if(!confirm('Delete invoice ' + currentInvoice.invoice_number + '?')) return;
    authFetch('/api/invoicekit/invoices/' + currentInvoice.id, { method:'DELETE' }).then(function(r){ return r.json(); }).then(function(data){
      if(data.ok){
        invoices = invoices.filter(function(i){ return i.id !== currentInvoice.id; });
        currentInvoice = null;
        document.getElementById('invoiceEditor').style.display = 'none';
        document.getElementById('ikEmptyMain').style.display = 'flex';
        renderList();
        showToast('Invoice deleted.', '✅');
      }
    });
  }
  window.deleteInvoice = deleteInvoice;

  function exportPdf(){
    var t = currentTotals();
    var jsPDF = window.jspdf.jsPDF;
    var doc = new jsPDF();
    var business = document.getElementById('fBusiness').value.trim() || 'AppAholic Business';
    var clientSel = document.getElementById('fClient');
    var clientName = clientSel.options[clientSel.selectedIndex] ? clientSel.options[clientSel.selectedIndex].text : 'No client';
    var invNum = document.getElementById('fInvNum').value.trim();

    doc.setFont('helvetica', 'bold'); doc.setFontSize(20); doc.text(business, 14, 22);
    doc.setFontSize(11); doc.setFont('helvetica', 'normal'); doc.text('Invoice ' + invNum, 14, 30);
    doc.text('Bill to: ' + clientName, 14, 40);
    doc.text('Due: ' + (document.getElementById('fDueDate').value || 'On receipt'), 14, 46);

    var y = 62;
    doc.setFont('helvetica', 'bold');
    doc.text('Description', 14, y); doc.text('Qty', 120, y); doc.text('Price', 145, y); doc.text('Amount', 175, y);
    doc.setFont('helvetica', 'normal');
    y += 6; doc.line(14, y - 4, 196, y - 4);
    draftItems.filter(function(i){ return i.description.trim(); }).forEach(function(item){
      doc.text(String(item.description).slice(0, 45), 14, y);
      doc.text(String(item.qty), 120, y);
      doc.text(Number(item.price).toLocaleString(), 145, y);
      doc.text(Number(item.qty * item.price).toLocaleString(), 175, y);
      y += 8;
    });
    y += 4; doc.line(120, y - 4, 196, y - 4);
    doc.text('Subtotal', 145, y); doc.text('NGN ' + t.subtotal.toLocaleString(), 175, y); y += 7;
    doc.text('VAT (' + t.vatRate + '%)', 145, y); doc.text('NGN ' + t.vat.toLocaleString(), 175, y); y += 7;
    if(t.whtRate){ doc.text('WHT (' + t.whtRate + '%)', 145, y); doc.text('-NGN ' + t.wht.toLocaleString(), 175, y); y += 7; }
    doc.setFont('helvetica', 'bold'); doc.setFontSize(13);
    doc.text('Total', 145, y + 2); doc.text('NGN ' + t.total.toLocaleString(), 175, y + 2);

    doc.save((invNum || 'invoice') + '.pdf');
    showToast('PDF downloaded.', '✅');
  }
  window.exportPdf = exportPdf;

  function sendInvoiceEmail(){
    var clientSel = document.getElementById('fClient');
    var client = clients.find(function(c){ return c.id === clientSel.value; });
    if(!client || !client.email){ showToast('Select a client with a saved email first.', '⚠️'); return; }
    var t = currentTotals();
    authFetch('/api/send-invoice', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        clientEmail: client.email, clientName: client.name, invoiceNum: document.getElementById('fInvNum').value.trim(),
        businessName: document.getElementById('fBusiness').value.trim(), total: t.total, dueDate: document.getElementById('fDueDate').value,
      })
    }).then(function(r){ return r.json(); }).then(function(data){
      showToast(data.ok ? 'Invoice emailed to ' + client.email : (data.error || 'Could not send email.'), data.ok ? '✅' : '⚠️');
    }).catch(function(){ showToast('Could not reach the server.', '⚠️'); });
  }
  window.sendInvoiceEmail = sendInvoiceEmail;

  function showClientsPanel(){
    document.getElementById('ikEmptyMain').style.display = 'none';
    document.getElementById('invoiceEditor').style.display = 'none';
    var panel = document.getElementById('clientsPanel');
    panel.style.display = 'block';
    panel.innerHTML =
      '<h1 style="font-family:var(--font-display);font-size:22px;font-weight:700;margin-bottom:20px">Add a Client</h1>' +
      '<div class="form-grid-2">' +
        '<div class="form-row"><label>Name <span>*</span></label><input class="form-input" id="cName" placeholder="Client or company name"/></div>' +
        '<div class="form-row"><label>Email</label><input class="form-input" type="email" id="cEmail" placeholder="client@example.com"/></div>' +
      '</div>' +
      '<div class="form-grid-2">' +
        '<div class="form-row"><label>Phone</label><input class="form-input" id="cPhone" placeholder="+234 800 000 0000"/></div>' +
        '<div class="form-row"><label>Address</label><input class="form-input" id="cAddress" placeholder="Optional"/></div>' +
      '</div>' +
      '<button class="btn btn-primary" onclick="saveClient()">Save Client</button>';
  }

  function saveClient(){
    var name = document.getElementById('cName').value.trim();
    if(!name){ showToast('Client name is required.', '⚠️'); return; }
    authFetch('/api/invoicekit/clients', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ name: name, email: document.getElementById('cEmail').value.trim(), phone: document.getElementById('cPhone').value.trim(), address: document.getElementById('cAddress').value.trim() })
    }).then(function(r){ return r.json(); }).then(function(data){
      if(data.ok){ clients.push(data.client); renderList(); showToast('Client added.', '✅'); showClientsPanel(); }
      else { showToast(data.error || 'Could not add client.', '⚠️'); }
    }).catch(function(){ showToast('Could not reach the server.', '⚠️'); });
  }
  window.saveClient = saveClient;
  window.__ikEditClient = function(id){ showToast('Edit an existing client from the invoice form for now.', 'ℹ️'); };

  document.getElementById('mobileMenuBtn').addEventListener('click', function(){ document.getElementById('ikSidebar').classList.toggle('mobile-open'); });

  loadAll();
}
</script>
</body>
</html>
